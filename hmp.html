<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>.</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* makes the experience feel clean, but text remains selectable if needed */
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #ffdde1 0%, #ffb7c5 100%);
      font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Poppins', 'Cabin', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      cursor: default;
    }

    /* main card – soft glassmorphic romantic container */
    .love-card {
      background: rgba(255, 245, 247, 0.85);
      backdrop-filter: blur(4px);
      border-radius: 68px;
      padding: 2.5rem 2.8rem;
      box-shadow: 0 25px 45px rgba(255, 105, 130, 0.3), 0 0 0 1px rgba(255, 215, 225, 0.6);
      text-align: center;
      max-width: 650px;
      width: 88%;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 220, 230, 0.8);
      animation: softGlow 3s infinite alternate;
    }

    @keyframes softGlow {
      0% {
        box-shadow: 0 20px 35px rgba(255, 80, 120, 0.2), 0 0 0 1px rgba(255, 200, 210, 0.7);
      }
      100% {
        box-shadow: 0 30px 55px rgba(255, 80, 130, 0.45), 0 0 0 2px rgba(255, 170, 190, 0.9);
      }
    }

    .question {
      font-size: 3.4rem;
      font-weight: 700;
      color: #c72a4f;
      letter-spacing: -0.3px;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 12px rgba(255, 200, 210, 0.6);
      word-break: keep-all;
    }

    .question span {
      display: inline-block;
      animation: subtleBeat 1.8s infinite ease;
    }

    @keyframes subtleBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); text-shadow: 0 0 8px #ff90aa; }
    }

    .sub-message {
      font-size: 1.35rem;
      color: #b34162;
      background: rgba(255, 235, 240, 0.7);
      display: inline-block;
      padding: 0.45rem 1.8rem;
      border-radius: 60px;
      margin-bottom: 2rem;
      font-weight: 500;
      backdrop-filter: blur(2px);
      letter-spacing: 0.3px;
    }

    /* interactive answer section */
    .button-group {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin: 2.2rem 0 1rem;
    }

    .btn {
      font-size: 1.7rem;
      font-weight: 600;
      padding: 0.7rem 1.8rem;
      border: none;
      border-radius: 60px;
      background: white;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      font-family: inherit;
    }

    .btn-yes {
      background: #ff6f91;
      color: white;
      box-shadow: 0 8px 18px #ffb7c5;
    }

    .btn-yes:hover {
      background: #ff5277;
      transform: scale(1.05);
      box-shadow: 0 12px 22px rgba(255, 80, 110, 0.4);
    }

    .btn-no {
      background: #ffe3e9;
      color: #b34767;
      border: 1px solid #ffbfcf;
    }

    .btn-no:hover {
      background: #ffd0db;
      transform: scale(0.97);
    }

    /* response message after answer */
    .response-message {
      margin-top: 2rem;
      font-size: 1.5rem;
      font-weight: 500;
      color: #b12a4e;
      background: rgba(255, 245, 248, 0.9);
      padding: 0.8rem 1.2rem;
      border-radius: 50px;
      transition: all 0.2s;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      backdrop-filter: blur(5px);
    }

    .small-note {
      font-size: 0.85rem;
      margin-top: 2rem;
      color: #dd8aa4;
    }

    /* floating hearts container (moving hearts) */
    .hearts-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
      overflow: hidden;
    }

    .floating-heart {
      position: absolute;
      font-size: 1.4rem;
      user-select: none;
      opacity: 0.7;
      animation: floatUpHeart 8s linear forwards;
      color: #ff4d6d;
      filter: drop-shadow(0 0 4px #ff8aa8);
      will-change: transform;
    }

    @keyframes floatUpHeart {
      0% {
        transform: translateY(100vh) scale(0.6);
        opacity: 0.9;
      }
      70% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(-15vh) scale(1.2);
        opacity: 0;
      }
    }

    /* second heart style - occasional rotating bigger hearts */
    .floating-heart.big {
      font-size: 2.2rem;
      animation-duration: 11s;
      opacity: 0.5;
    }

    /* name bottom left */
    .name-corner {
      position: fixed;
      bottom: 18px;
      left: 22px;
      font-size: 0.85rem;
      font-weight: 400;
      color: #d45a7a;
      background: rgba(255, 245, 250, 0.5);
      backdrop-filter: blur(4px);
      padding: 4px 12px;
      border-radius: 50px;
      letter-spacing: 0.5px;
      font-family: monospace;
      z-index: 30;
      pointer-events: none;
      border: 0.5px solid rgba(255, 105, 130, 0.3);
      transition: 0.2s;
    }

    /* additional cute heart near the question */
    .heart-icon {
      display: inline-block;
      animation: pulseHeart 0.9s infinite alternate;
      font-size: 2rem;
      margin: 0 6px;
      vertical-align: middle;
    }

    @keyframes pulseHeart {
      0% { transform: scale(0.9); opacity: 0.7; }
      100% { transform: scale(1.2); opacity: 1; text-shadow: 0 0 8px #ff5f88; }
    }

    /* responsive */
    @media (max-width: 550px) {
      .love-card {
        padding: 1.8rem 1.2rem;
        width: 92%;
      }
      .question {
        font-size: 2.2rem;
      }
      .btn {
        font-size: 1.3rem;
        padding: 0.5rem 1.4rem;
      }
      .sub-message {
        font-size: 1rem;
      }
      .response-message {
        font-size: 1.2rem;
      }
      .heart-icon {
        font-size: 1.6rem;
      }
    }

    /* extra soft heart trail effect on buttons (optional) */
    .btn:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>

<div class="hearts-container" id="heartsContainer"></div>

<div class="love-card">
  <div class="question">
    <span class="heart-icon">❤️</span>
    Can I be yours?
    <span class="heart-icon">💖</span>
  </div>
  <div class="sub-message">
    every beat of my heart whispers your name ✨
  </div>

  <div class="button-group">
    <button class="btn btn-yes" id="yesBtn">💕 Yes 💕</button>
    <button class="btn btn-no" id="noBtn">🌸 No 🌸</button>
  </div>

  <div id="responseArea" class="response-message">
    💭 waiting for your answer...
  </div>
  <div class="small-note">
    (every click creates more moving hearts 💘)
  </div>
</div>

<div class="name-corner">
  Paula
</div>

<script>
  (function() {
    // === moving hearts generator (Pink theme with floating hearts) ===
    const heartsContainer = document.getElementById('heartsContainer');
    let activeHeartCount = 0;
    const MAX_HEARTS = 45;      // to keep performance smooth

    // heart symbols collection (cute variations)
    const heartSymbols = ['❤️', '💖', '💗', '💓', '💕', '💞', '💘', '❣️', '💝', '🧡', '🌸', '💋'];  // added light hearts & kiss
    // generate a random floating heart
    function createFloatingHeart(isBig = false) {
      if (activeHeartCount > MAX_HEARTS) return;
      
      const heart = document.createElement('div');
      heart.classList.add('floating-heart');
      if (isBig && Math.random() > 0.7) heart.classList.add('big');
      
      // random left position (0% - 100%)
      const leftPos = Math.random() * 100;
      // random heart symbol
      const randomHeart = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
      heart.innerText = randomHeart;
      
      // random size variation (inline style)
      const baseSize = isBig ? 2.2 : 0.9 + Math.random() * 1.2;
      heart.style.fontSize = `${baseSize}rem`;
      heart.style.left = `${leftPos}%`;
      heart.style.opacity = 0.5 + Math.random() * 0.4;
      // random animation duration between 5s and 12s
      const duration = 5 + Math.random() * 8;
      heart.style.animationDuration = `${duration}s`;
      // delay so they don't all start at same time
      heart.style.animationDelay = `${Math.random() * 3}s`;
      
      heartsContainer.appendChild(heart);
      activeHeartCount++;
      
      // remove after animation ends
      heart.addEventListener('animationend', () => {
        if (heart.parentNode) heart.remove();
        activeHeartCount--;
      });
    }
    
    // continuous moving hearts: generate at intervals (pink theme with constant movement)
    let heartInterval;
    function startHeartRain() {
      if (heartInterval) clearInterval(heartInterval);
      heartInterval = setInterval(() => {
        // create 1-3 hearts every 400ms based on mood
        const howMany = Math.random() > 0.65 ? 2 : 1;
        for (let i = 0; i < howMany; i++) {
          if (activeHeartCount < MAX_HEARTS + 5) {
            createFloatingHeart(Math.random() > 0.8);
          }
        }
      }, 480);
    }
    
    // extra burst of hearts on special moments (when clicking answer or loading)
    function burstHearts(count = 12) {
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          if (activeHeartCount < MAX_HEARTS + 8) {
            createFloatingHeart(Math.random() > 0.75);
          }
        }, i * 40);
      }
    }
    
    // initial hearts + continuous stream
    for (let i = 0; i < 14; i++) {
      setTimeout(() => createFloatingHeart(false), i * 100);
    }
    startHeartRain();
    
    // ---- romantic interaction logic ----
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const responseArea = document.getElementById('responseArea');
    
    // sweet messages with hearts
    const yesMessages = [
      "💖 YAY! 💖 You just made my whole world sparkle! ✨ I'm yours, Paula! 💕",
      "🌷 Really?? My heart is doing cartwheels!! 🌷 You're the sweetest, can't wait to cherish you 💘",
      "💗 Ahh! I feel like the luckiest person ever. You and me? That's a dream. 💗",
      "🌸 Paula... you said yes! 🌸 Let's fill every day with love and little joys 💞",
      "💞 EEEEK! 💞 *happy tears* I promise to be the best for you. Yours forever. 💖"
    ];
    
    const noMessages = [
      "🌙 It's okay... my heart will still quietly adore you. But maybe give me a chance? 💌",
      "🌸 That's alright, Paula. I'll still send you floating hearts and smiles. 🌸 (can i change your mind?) ✨",
      "💭 I understand... but my heart keeps fluttering anyway. I'll always care for you. 🌹",
      "💗 no? okay no pressure.. but look! hearts never stop for you 💗 i'll be here if you ever change your mind.",
      "🌟 It's fine! I'll still think you're amazing. Maybe one day you'll see me differently. 💖 *sends more hearts*"
    ];
    
    // function to pick random message from array
    function getRandomMessage(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }
    
    // when Yes is clicked
    function handleYes() {
      const msg = getRandomMessage(yesMessages);
      responseArea.innerHTML = `💖 ${msg} 💖`;
      // super emotional heart burst (big celebration)
      burstHearts(24);
      // also slight change in background mood (additional pink glitter)
      document.body.style.background = "linear-gradient(145deg, #ffe0e7, #ffb0c0)";
      // add extra floating hearts for some seconds
      for (let i = 0; i < 6; i++) {
        setTimeout(() => {
          if (activeHeartCount < MAX_HEARTS + 6) createFloatingHeart(true);
        }, i * 180);
      }
      // disable no button after yes? no need to force, but we keep both interactive but add joyful vibes
      // just playful optional change to no button style? keep as is but make yes button glow
      yesBtn.style.transform = "scale(1.02)";
      setTimeout(() => { yesBtn.style.transform = ""; }, 300);
    }
    
    // when No is clicked (still adorable)
    function handleNo() {
      const msg = getRandomMessage(noMessages);
      responseArea.innerHTML = `💌 ${msg} 💌`;
      // generate a moderate amount of hearts but softer (still show moving love)
      burstHearts(15);
      // gentle background shift (not too sad, just sweet tone)
      document.body.style.background = "linear-gradient(145deg, #ffd4e2, #ffa5bd)";
      // add a little bounce on no button
      noBtn.style.transform = "scale(0.96)";
      setTimeout(() => { noBtn.style.transform = ""; }, 200);
    }
    
    yesBtn.addEventListener('click', handleYes);
    noBtn.addEventListener('click', handleNo);
    
    // extra romantic touch: when user hovers over the card, generate tiny soft heart
    const loveCard = document.querySelector('.love-card');
    let hoverTimeout;
    loveCard.addEventListener('mouseenter', () => {
      hoverTimeout = setTimeout(() => {
        if (activeHeartCount < MAX_HEARTS + 3) {
          createFloatingHeart(false);
        }
      }, 200);
    });
    loveCard.addEventListener('mouseleave', () => {
      if (hoverTimeout) clearTimeout(hoverTimeout);
    });
    
    // bonus: on window load show welcoming burst
    window.addEventListener('load', () => {
      setTimeout(() => {
        burstHearts(8);
      }, 300);
      // subtle greeting message might be nice, but we keep minimal
      responseArea.innerHTML = "💭 can i be yours? 🥺👉👈";
    });
    
    // also generate hearts periodically from mousemove – optional delicate touch (increase moving hearts)
    let lastMove = 0;
    document.addEventListener('mousemove', (e) => {
      const now = Date.now();
      if (now - lastMove > 300 && Math.random() > 0.85 && activeHeartCount < MAX_HEARTS + 5) {
        lastMove = now;
        // create a small heart near cursor? but make sure it doesn't overwhelm
        const heartNear = document.createElement('div');
        heartNear.classList.add('floating-heart');
        heartNear.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
        heartNear.style.position = 'fixed';
        heartNear.style.left = `${e.clientX - 12}px`;
        heartNear.style.top = `${e.clientY - 20}px`;
        heartNear.style.fontSize = '1rem';
        heartNear.style.opacity = '0.8';
        heartNear.style.animation = 'floatUpHeart 4s linear forwards';
        heartNear.style.pointerEvents = 'none';
        heartsContainer.appendChild(heartNear);
        activeHeartCount++;
        heartNear.addEventListener('animationend', () => {
          heartNear.remove();
          activeHeartCount--;
        });
      }
    });
    
    // ensure that the hearts container always cleans up properly
    // window resize doesn't break anything
  })();
</script>
</body>
</html>
